baseURL = 'https://nginx.org'
languageCode = 'en-us'
title = 'Example Site'
enableGitInfo = true


[module]
[[module.imports]]
  path="github.com/nginxinc/nginx-hugo-theme/v2"


[caches]
[caches.modules]
maxAge = -1

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.highlight]
      guessSyntax = true
      noClasses = false

[outputFormats]
  [outputFormats.llms]
    baseName       = "llms"
    mediaType      = "text/plain"
    isPlainText    = true
    notAlternative = true
  [outputFormats.llmsfull]
    baseName       = "llms-full"
    mediaType      = "text/plain"
    isPlainText    = true
    notAlternative = true
  [outputFormats.md]
    baseName       = "index"
    mediaType      = "text/markdown"
    isPlainText    = true
    notAlternative = true

[params]
  description = "Component example site and usage documentation for NGINX Hugo Theme"
  github_repo = "https://github.com/nginxinc/nginx-hugo-theme"
  github_subdir = "exampleSite"
  enable_last_modified = true
  coveo_search_redirect = "/search.html"
  [params.rich_meta]
    thumbnail = "/images/nginx-documentation-500x300.png"
    thumbnail_res = "500x300"
    twitter_username = "@f5"
    fb_publisher = "https://www.facebook.com/f5incorporated/"
  [params.featureFlags]
    disable_coveo = true
    disable_qualtrics = true